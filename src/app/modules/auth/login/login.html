<div class="min-h-screen bg-gray-950 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-white" viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white">ERP Suite</h1>
      <p class="text-sm text-gray-500 mt-1">
        {{ step() === 'empresa' ? 'Selecciona tu entorno de trabajo' : 'Inicia sesión en tu cuenta' }}
      </p>
    </div>

    <div class="bg-gray-900 border border-white/8 rounded-2xl p-6 space-y-4">

      <div *ngIf="error()" class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2.5">
        <svg class="w-4 h-4 text-red-400 flex-shrink-0" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 10v1"/>
        </svg>
        <span class="text-xs text-red-400">{{ error() }}</span>
      </div>

      <div *ngIf="step() === 'empresa'" class="space-y-3">
        
        <div *ngIf="loadingEmpresas()" class="flex justify-center py-4 text-gray-500">
          <svg class="w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </div>

        <button 
          *ngFor="let emp of empresas()" 
          (click)="seleccionarEmpresa(emp)"
          class="w-full text-left p-3 rounded-xl border border-white/8 bg-gray-800 hover:bg-gray-800/80 hover:border-indigo-500/50 transition-all group flex flex-col gap-1 cursor-pointer">
          <span class="text-sm font-semibold text-gray-100 group-hover:text-indigo-400 transition-colors">{{ emp.razonSocial }}</span>
          <span class="text-xs text-gray-500">RUC: {{ emp.ruc }}</span>
        </button>
      </div>

      <div *ngIf="step() === 'login'" class="space-y-4">
        
        <div class="flex items-center justify-between bg-gray-800/50 border border-white/8 rounded-lg px-3 py-2.5">
          <div class="flex flex-col">
            <span class="text-[10px] uppercase font-semibold text-gray-500 tracking-wider">Empresa</span>
            <span class="text-sm font-medium text-gray-200">{{ selectedEmpresa()?.razonSocial }}</span>
          </div>
          <button (click)="cambiarEmpresa()" class="text-xs font-medium text-indigo-400 hover:text-indigo-300 transition-colors px-2 py-1 rounded hover:bg-indigo-400/10">
            Cambiar
          </button>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-gray-400">Usuario</label>
          <input
            type="text"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            placeholder="tu_usuario"
            class="w-full bg-gray-800 border border-white/8 rounded-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          />
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-gray-400">Contraseña</label>
          <input
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="••••••••"
            (keydown.enter)="onSubmit()"
            class="w-full bg-gray-800 border border-white/8 rounded-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          />
        </div>

        <button
          (click)="onSubmit()"
          [disabled]="loading()"
          class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-semibold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2"
        >
          <svg *ngIf="loading()" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
          {{ loading() ? 'Ingresando...' : 'Iniciar sesión' }}
        </button>
      </div>

    </div>
  </div>
</div>
