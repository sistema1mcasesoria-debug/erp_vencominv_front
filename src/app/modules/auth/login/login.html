<div class="min-h-screen bg-gray-50 dark:bg-gray-950 flex items-center justify-center px-4 transition-colors duration-200">
  <div class="w-full max-w-sm">

    <!-- Sección del Logo -->
    <div class="flex flex-col items-center mb-8 relative">
      <!-- Ruta corregida: se quitó el ./ -->
      <img 
        src="LogoMCweb.png" 
        alt="Logo de la Empresa" 
        class="h-16 w-auto mb-4 object-contain"
      />
      <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">
        {{ step() === 'empresa' ? 'Selecciona tu entorno de trabajo' : 'Inicia sesión en tu cuenta' }}
      </p>
    </div>

    <!-- Contenedor Principal (Blanco en tema claro, Gris oscuro en tema oscuro) -->
    <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-white/8 rounded-2xl p-6 space-y-4 shadow-sm dark:shadow-none transition-colors duration-200">

      <!-- Mensaje de Error -->
      <div *ngIf="error()" class="flex items-center gap-2 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 rounded-lg px-3 py-2.5">
        <svg class="w-4 h-4 text-red-500 dark:text-red-400 flex-shrink-0" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 10v1"/>
        </svg>
        <span class="text-xs text-red-600 dark:text-red-400">{{ error() }}</span>
      </div>

      <!-- Paso: Selección de Empresa -->
      <div *ngIf="step() === 'empresa'" class="space-y-3">
        
        <div *ngIf="loadingEmpresas()" class="flex justify-center py-4 text-gray-400 dark:text-gray-500">
          <svg class="w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </div>

        <button 
          *ngFor="let emp of empresas()" 
          (click)="seleccionarEmpresa(emp)"
          class="w-full text-left p-3 rounded-xl border border-gray-200 dark:border-white/8 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/80 hover:border-indigo-500/50 transition-all group flex flex-col gap-1 cursor-pointer shadow-sm dark:shadow-none">
          <span class="text-sm font-semibold text-gray-900 dark:text-gray-100 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">{{ emp.razonSocial }}</span>
          <span class="text-xs text-gray-500 dark:text-gray-500">RUC: {{ emp.ruc }}</span>
        </button>
      </div>

      <!-- Paso: Login -->
      <div *ngIf="step() === 'login'" class="space-y-4">
        
        <!-- Empresa Seleccionada -->
        <div class="flex items-center justify-between bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-white/8 rounded-lg px-3 py-2.5">
          <div class="flex flex-col">
            <span class="text-[10px] uppercase font-semibold text-gray-500 tracking-wider">Empresa</span>
            <span class="text-sm font-medium text-gray-900 dark:text-gray-200">{{ selectedEmpresa()?.razonSocial }}</span>
          </div>
          <button (click)="cambiarEmpresa()" class="text-xs font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors px-2 py-1 rounded hover:bg-indigo-50 dark:hover:bg-indigo-400/10">
            Cambiar
          </button>
        </div>

        <!-- Input Usuario -->
        <div class="space-y-1.5">
          <label class="text-xs font-medium text-gray-700 dark:text-gray-400">Usuario</label>
          <input
            type="text"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            placeholder="tu_usuario"
            class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-white/8 rounded-lg px-3 py-2.5 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          />
        </div>

        <!-- Input Contraseña -->
        <div class="space-y-1.5">
          <label class="text-xs font-medium text-gray-700 dark:text-gray-400">Contraseña</label>
          <input
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="••••••••"
            (keydown.enter)="onSubmit()"
            class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-white/8 rounded-lg px-3 py-2.5 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
          />
        </div>

        <!-- Botón Ingresar -->
        <button
          (click)="onSubmit()"
          [disabled]="loading()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 dark:hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-semibold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2 shadow-sm"
        >
          <svg *ngIf="loading()" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
          {{ loading() ? 'Ingresando...' : 'Iniciar sesión' }}
        </button>
      </div>

    </div>
  </div>
</div>
