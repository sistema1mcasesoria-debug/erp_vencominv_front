<header class="flex items-center justify-between h-14 px-5 bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-white/5 transition-colors duration-200">

  <nav class="flex items-center gap-1.5 text-sm" aria-label="Breadcrumb">
    <ng-container *ngFor="let crumb of breadcrumbs(); let last = last; let i = index">
      <span
        *ngIf="i > 0"
        class="text-gray-400 dark:text-gray-600"
        aria-hidden="true"
      >/</span>
      <span
        [class]="last
          ? 'text-gray-900 dark:text-gray-200 font-medium'
          : 'text-gray-500 dark:text-gray-500 hover:text-gray-800 dark:hover:text-gray-300 cursor-pointer transition-colors'"
      >{{ crumb.label }}</span>
    </ng-container>
  </nav>

  <div class="flex items-center gap-2">
    <div class="w-px h-5 bg-gray-200 dark:bg-white/8"></div>

    <div class="relative nav-profile">
      <button
        (click)="toggleProfile()"
        class="flex items-center gap-2 pl-1 pr-2.5 py-1 rounded-lg hover:bg-gray-100 dark:hover:bg-white/5 transition-colors"
        aria-label="Perfil de usuario"
      >
        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0 overflow-hidden">
          <img *ngIf="usuarioFoto()" [src]="usuarioFoto()" alt="Foto" class="w-full h-full object-cover">
          <span *ngIf="!usuarioFoto()">{{ avatarLetter() }}</span>
        </div>
        <div class="hidden sm:flex flex-col items-start leading-none">
          <span class="text-xs font-semibold text-gray-900 dark:text-gray-200">{{ usuarioNombre() }}</span>
          <span class="text-[11px] text-gray-500 mt-0.5">{{ userRol() | titlecase }}</span>
        </div>
        <svg class="w-3.5 h-3.5 text-gray-400 dark:text-gray-500 hidden sm:block" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4l4 4 4-4"/>
        </svg>
      </button>

      <div
        *ngIf="profileOpen()"
        class="absolute right-0 top-10 w-52 bg-white dark:bg-gray-900 border border-gray-200 dark:border-white/8 rounded-xl shadow-lg dark:shadow-2xl shadow-black/5 dark:shadow-black/40 z-50 overflow-hidden transition-colors duration-200"
      >
        <div class="px-4 py-3 border-b border-gray-100 dark:border-white/5 bg-gray-50 dark:bg-transparent">
          <p class="text-xs font-semibold text-gray-900 dark:text-gray-100 truncate">{{ usuarioNombre() }}</p>
          <p class="text-[11px] text-gray-500 truncate mt-0.5">{{ empresaNombre() }}</p>
        </div>

        <ul class="py-1">
          <li>
            <button 
              routerLink="/perfil"
              (click)="profileOpen.set(false)"
              class="w-full flex items-center gap-3 px-4 py-2 text-xs text-gray-700 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 hover:text-gray-900 dark:hover:text-gray-200 transition-colors text-left"
            >
              <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>
              Mi perfil
            </button>
          </li>
          <li>
            <button class="w-full flex items-center gap-3 px-4 py-2 text-xs text-gray-700 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 hover:text-gray-900 dark:hover:text-gray-200 transition-colors text-left">
              <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/></svg>
              Configuración
            </button>
          </li>
        </ul>

        <div class="border-t border-gray-100 dark:border-white/5 py-1">
          <button
            (click)="logout()"
            class="w-full flex items-center gap-3 px-4 py-2 text-xs text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/8 transition-colors text-left"
          >
            <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M10 8H3M10 8l-2.5-2.5M10 8l-2.5 2.5M6 4V3a1 1 0 011-1h5a1 1 0 011 1v10a1 1 0 01-1 1H7a1 1 0 01-1-1v-1"/>
            </svg>
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>

  </div>
</header>
