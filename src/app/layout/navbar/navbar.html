<header class="flex items-center justify-between h-14 px-5 bg-gray-950 border-b border-white/5">

  <!-- Breadcrumbs -->
  <nav class="flex items-center gap-1.5 text-sm" aria-label="Breadcrumb">
    <ng-container *ngFor="let crumb of breadcrumbs(); let last = last; let i = index">
      <span
        *ngIf="i > 0"
        class="text-gray-600"
        aria-hidden="true"
      >/</span>
      <span
        [class]="last
          ? 'text-gray-200 font-medium'
          : 'text-gray-500 hover:text-gray-300 cursor-pointer transition-colors'"
      >{{ crumb.label }}</span>
    </ng-container>
  </nav>

  <!-- Right side actions -->
  <div class="flex items-center gap-2">

    <!-- Notifications -->
    <div class="relative nav-notifications">
      <button
        (click)="toggleNotifications()"
        class="relative w-8 h-8 rounded-lg text-gray-400 hover:bg-white/5 hover:text-gray-200 flex items-center justify-center transition-colors"
        aria-label="Notificaciones"
      >
        <svg class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M10 2a6 6 0 00-6 6c0 3.5-1.5 5-1.5 5h15s-1.5-1.5-1.5-5a6 6 0 00-6-6zM8.5 17a1.5 1.5 0 003 0"/>
        </svg>
        <!-- Badge -->
        <span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-indigo-500 ring-2 ring-gray-950"></span>
      </button>

      <!-- Dropdown notifications -->
      <div
        *ngIf="notificationsOpen()"
        class="absolute right-0 top-10 w-72 bg-gray-900 border border-white/8 rounded-xl shadow-2xl shadow-black/40 z-50 overflow-hidden"
      >
        <div class="flex items-center justify-between px-4 py-3 border-b border-white/5">
          <span class="text-sm font-semibold text-gray-100">Notificaciones</span>
          <span class="text-xs text-indigo-400 cursor-pointer hover:text-indigo-300">Marcar leídas</span>
        </div>

        <ul class="divide-y divide-white/5 max-h-64 overflow-y-auto">
          <li class="flex gap-3 px-4 py-3 hover:bg-white/4 transition-colors">
            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-amber-500/10 flex items-center justify-center">
              <svg class="w-4 h-4 text-amber-400" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l1.8 3.6L14 5.3l-3 2.9.7 4.1L8 10.4l-3.7 1.9.7-4.1-3-2.9 4.2-.7z"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-xs text-gray-200 font-medium leading-snug">Stock bajo en Producto #14</p>
              <p class="text-[11px] text-gray-500 mt-0.5">Hace 5 minutos</p>
            </div>
          </li>
          <li class="flex gap-3 px-4 py-3 hover:bg-white/4 transition-colors">
            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-green-500/10 flex items-center justify-center">
              <svg class="w-4 h-4 text-green-400" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l3 3 7-7"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-xs text-gray-200 font-medium leading-snug">Pedido #38 listo para entrega</p>
              <p class="text-[11px] text-gray-500 mt-0.5">Hace 22 minutos</p>
            </div>
          </li>
          <li class="flex gap-3 px-4 py-3 hover:bg-white/4 transition-colors">
            <div class="flex-shrink-0 w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center">
              <svg class="w-4 h-4 text-red-400" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 5v4M8 11v1"/><circle cx="8" cy="8" r="6"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-xs text-gray-200 font-medium leading-snug">Lote #7 próximo a vencer</p>
              <p class="text-[11px] text-gray-500 mt-0.5">Hace 1 hora</p>
            </div>
          </li>
        </ul>

        <div class="px-4 py-2.5 border-t border-white/5">
          <span class="text-xs text-indigo-400 cursor-pointer hover:text-indigo-300">Ver todas →</span>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="w-px h-5 bg-white/8"></div>

    <!-- Profile -->
    <div class="relative nav-profile">
      <button
        (click)="toggleProfile()"
        class="flex items-center gap-2 pl-1 pr-2.5 py-1 rounded-lg hover:bg-white/5 transition-colors"
        aria-label="Perfil de usuario"
      >
        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
          {{ avatarLetter() }}
        </div>
        <div class="hidden sm:flex flex-col items-start leading-none">
          <span class="text-xs font-semibold text-gray-200">{{ usuarioNombre() }}</span>
          <span class="text-[11px] text-gray-500 mt-0.5">{{ userRol() | titlecase }}</span>
        </div>
        <svg class="w-3.5 h-3.5 text-gray-500 hidden sm:block" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4l4 4 4-4"/>
        </svg>
      </button>

      <!-- Dropdown profile -->
      <div
        *ngIf="profileOpen()"
        class="absolute right-0 top-10 w-52 bg-gray-900 border border-white/8 rounded-xl shadow-2xl shadow-black/40 z-50 overflow-hidden"
      >
        <!-- User info header -->
        <div class="px-4 py-3 border-b border-white/5">
          <p class="text-xs font-semibold text-gray-100 truncate">{{ usuarioNombre() }}</p>
          <p class="text-[11px] text-gray-500 truncate mt-0.5">{{ empresaNombre() }}</p>
        </div>

        <ul class="py-1">
          <li>
            <button class="w-full flex items-center gap-3 px-4 py-2 text-xs text-gray-400 hover:bg-white/5 hover:text-gray-200 transition-colors text-left">
              <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>
              Mi perfil
            </button>
          </li>
          <li>
            <button class="w-full flex items-center gap-3 px-4 py-2 text-xs text-gray-400 hover:bg-white/5 hover:text-gray-200 transition-colors text-left">
              <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/></svg>
              Configuración
            </button>
          </li>
        </ul>

        <div class="border-t border-white/5 py-1">
          <button
            (click)="logout()"
            class="w-full flex items-center gap-3 px-4 py-2 text-xs text-red-400 hover:bg-red-500/8 transition-colors text-left"
          >
            <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M10 8H3M10 8l-2.5-2.5M10 8l-2.5 2.5M6 4V3a1 1 0 011-1h5a1 1 0 011 1v10a1 1 0 01-1 1H7a1 1 0 01-1-1v-1"/>
            </svg>
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>

  </div>
</header>
