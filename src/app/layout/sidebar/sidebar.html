<aside
  [class]="collapsed()
    ? 'relative flex flex-col w-16 h-full bg-gray-950 border-r border-white/5 transition-all duration-300'
    : 'relative flex flex-col w-60 h-full bg-gray-950 border-r border-white/5 transition-all duration-300'"
>

  <div class="flex items-center gap-3 px-4 py-5 border-b border-white/5">
    <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
      <svg class="w-4 h-4 text-white" viewBox="0 0 16 16" fill="currentColor">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>
        <rect x="9" y="9" width="6" height="6" rx="1"/>
      </svg>
    </div>
    <div *ngIf="!collapsed()" class="flex flex-col overflow-hidden">
      <span class="text-sm font-bold text-white tracking-tight leading-none">ERP Suite</span>
      <span class="text-xs text-gray-500 truncate mt-0.5 max-w-[140px]">{{ empresaNombre() }}</span>
    </div>
  </div>

  <button
    (click)="toggleSidebar()"
    class="absolute -right-3 top-6 w-6 h-6 rounded-full bg-gray-900 border border-white/10 text-gray-400 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 flex items-center justify-center transition-colors z-10 cursor-pointer"
    [attr.aria-label]="collapsed() ? 'Expandir menú' : 'Colapsar menú'"
  >
    <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path *ngIf="!collapsed()" d="M1 2h10M1 6h10M1 10h10"/>
      <path *ngIf="collapsed()"  d="M3 2l5 4-5 4"/>
    </svg>
  </button>

  <nav class="flex-1 overflow-y-auto overflow-x-hidden py-3 px-2 space-y-1">
    
    <ng-container *ngFor="let item of visibleItems()">
      
      <a
        *ngIf="!item.children"
        (click)="cerrarSubmenus()" 
        [routerLink]="item.route"
        routerLinkActive="bg-indigo-500/10 !text-indigo-400"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="group relative flex items-center gap-3 px-2.5 py-2 rounded-lg text-gray-400 hover:bg-white/5 hover:text-gray-200 transition-colors duration-150 no-underline"
        [title]="collapsed() ? item.label : ''"
      >
        <span class="flex-shrink-0 w-5 h-5 flex items-center justify-center">
          <ng-container [ngSwitch]="item.icon">
            <svg *ngSwitchCase="'grid'" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
              <path d="M5 3h4v4H5zM11 3h4v4h-4zM5 11h4v4H5zM11 11h4v4h-4z"/>
            </svg>
            <svg *ngSwitchCase="'package'" class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M16 8l-6-4-6 4v8l6 4 6-4V8z"/><path d="M10 4v12M4 8l6 4 6-4"/>
            </svg>
            <svg *ngSwitchCase="'shopping-cart'" class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 3h2l.4 2M7 13h10l1.4-7H5.4M7 13l-1.4-7M7 13a2 2 0 100 4 2 2 0 000-4zm10 0a2 2 0 100 4 2 2 0 000-4z"/>
            </svg>
            <svg *ngSwitchCase="'clipboard'" class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="3" width="10" height="14" rx="1"/><path d="M8 3v1h4V3M7 9h6M7 12h4"/>
            </svg>
            <svg *ngSwitchCase="'receipt'" class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 3v14l2-1.5 2 1.5 2-1.5 2 1.5 2-1.5V3l-2 1.5L11 3 9 4.5 7 3 5 4.5z"/><path d="M8 8h4M8 11h4"/>
            </svg>
            <svg *ngSwitchCase="'user-cog'" class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="7" r="3"/><path d="M2 17c0-3.3 2.7-6 6-6"/>
              <circle cx="16" cy="15" r="2"/><path d="M16 11v1M16 18v1M13 12l.7.7M19 18l-.7-.7M11 15h1M20 15h1M13 18l.7-.7M19 12l-.7.7"/>
            </svg>
          </ng-container>
        </span>
        <span *ngIf="!collapsed()" class="text-sm font-medium truncate">{{ item.label }}</span>
      </a>

      <div *ngIf="item.children" class="flex flex-col">
        <button
          (click)="toggleSubmenu(item)"
          [class.bg-white_5]="expandedSubmenu() === item.label"
          [title]="collapsed() ? item.label : ''"
          class="w-full group relative flex items-center justify-between gap-3 px-2.5 py-2 rounded-lg text-gray-400 hover:bg-white/5 hover:text-gray-200 transition-colors duration-150 cursor-pointer"
        >
          <div class="flex items-center gap-3">
            <span class="flex-shrink-0 w-5 h-5 flex items-center justify-center">
              <svg *ngIf="item.icon === 'tag'" class="w-5 h-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 3h7l7 7-7 7-7-7V3z"/><circle cx="7" cy="7" r="1"/>
              </svg>
            </span>
            <span *ngIf="!collapsed()" class="text-sm font-medium truncate">{{ item.label }}</span>
          </div>
          
          <svg *ngIf="!collapsed()" 
               [class.rotate-180]="expandedSubmenu() === item.label"
               class="w-4 h-4 transition-transform duration-200 text-gray-500" 
               fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <div *ngIf="!collapsed() && expandedSubmenu() === item.label" class="mt-1 mb-1 space-y-0.5 ml-9 flex flex-col">
          <a
            *ngFor="let child of getVisibleChildren(item.children)"
            [routerLink]="child.route"
            routerLinkActive="bg-indigo-500/10 !text-indigo-400"
            [routerLinkActiveOptions]="{ exact: true }"
            class="px-3 py-1.5 rounded-lg text-sm text-gray-400 hover:bg-white/5 hover:text-gray-200 transition-colors no-underline block"
          >
            {{ child.label }}
          </a>
        </div>
      </div>

    </ng-container>
  </nav>

  <div class="flex items-center gap-2 px-3 py-3 border-t border-white/5">
    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-xs font-bold">
      {{ avatarLetter() }}
    </div>

    <div *ngIf="!collapsed()" class="flex-1 overflow-hidden">
      <p class="text-xs font-semibold text-gray-200 truncate">{{ usuarioNombre() }}</p>
      <p class="text-[11px] text-gray-500">{{ userRol() | titlecase }}</p>
    </div>

    <button
      *ngIf="!collapsed()"
      (click)="logout()"
      title="Cerrar sesión"
      class="flex-shrink-0 w-7 h-7 rounded-md border border-white/10 text-gray-500 hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/30 flex items-center justify-center transition-colors cursor-pointer"
    >
      <svg class="w-4 h-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M13 10H3M13 10l-3-3M13 10l-3 3M8 5V4a1 1 0 011-1h6a1 1 0 011 1v12a1 1 0 01-1 1H9a1 1 0 01-1-1v-1"/>
      </svg>
    </button>
  </div>

</aside>
